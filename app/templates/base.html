<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Support Co-Pilot{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

  <nav class="bg-white border-b border-gray-200 px-6 py-3 flex items-center gap-6">
    <span class="font-semibold text-lg tracking-tight">Support Co-Pilot</span>
    <a href="/" class="text-sm text-gray-600 hover:text-gray-900">Inbox</a>
    <a href="/dashboard" class="text-sm text-gray-600 hover:text-gray-900">Dashboard</a>
  </nav>

  <main class="px-6 py-6 max-w-7xl mx-auto">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
